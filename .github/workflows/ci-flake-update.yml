name: Flake Update

on:
  schedule:
    - cron: "0 0 */3 * *"
  workflow_dispatch:
    inputs:
      input:
        description: "Specific flake input to update (leave empty to update all)"
        required: false
        default: ""

jobs:
  flake-update:
    name: Update Flake Inputs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Set up Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Update flake inputs
        run: |
          if [ -n "${{ github.event.inputs.input }}" ]; then
            echo "Updating input: ${{ github.event.inputs.input }}"
            nix flake update "${{ github.event.inputs.input }}"
          else
            nix flake update
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          if git diff --cached --quiet; then
            echo "flake.lock is already up to date, nothing to commit."
          else
            git commit -m "chore: update flake inputs"
            git push origin master
          fi
