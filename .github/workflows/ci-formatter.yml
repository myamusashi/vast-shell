name: QML Format and Types Check
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  qml-format-check:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: git safe directory
        run: git config --global --add safe.directory '*'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm \
            git go fd qt6-declarative qt6-tools

      - name: Run QML formatter
        run: go run Assets/go/formatting.go --skip-lupdate

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo ""
            echo "QML files are not formatted correctly."
            echo "Run 'go run Assets/go/formatting.go' locally and commit the changes."
            exit 1
          fi
